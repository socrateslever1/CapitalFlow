<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#4f46e5">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="CapitalFlow">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <link rel="icon" type="image/png" href="/icon-192.png">
    
    <link rel="manifest" href="/manifest.json">
    
    <title>CapitalFlow</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }
        @media (max-width: 640px) {
            input, select, textarea {
                font-size: 16px !important;
            }
        }
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 10px;
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .pb-safe {
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* Simulador: densidade mobile semelhante ao mockup, sem afetar as demais telas. */
        @media (max-width: 679px) {
            .animate-in.fade-in.pb-28.font-sans.duration-300 {
                padding-bottom: 10.5rem !important;
            }

            .animate-in.fade-in.pb-28.font-sans.duration-300 > header {
                margin-bottom: 0.75rem !important;
                gap: 0.65rem !important;
                padding-bottom: 0.85rem !important;
            }

            .animate-in.fade-in.pb-28.font-sans.duration-300 > header > div:first-child {
                width: 2.45rem !important;
                height: 2.45rem !important;
            }

            .animate-in.fade-in.pb-28.font-sans.duration-300 > header svg {
                width: 1.1rem !important;
                height: 1.1rem !important;
            }

            .animate-in.fade-in.pb-28.font-sans.duration-300 > header h1 {
                font-size: 0.92rem !important;
                line-height: 1.1rem !important;
            }

            .animate-in.fade-in.pb-28.font-sans.duration-300 > header p {
                margin-top: 0.15rem !important;
                font-size: 0.56rem !important;
            }

            .animate-in.fade-in.pb-28.font-sans.duration-300 > div:nth-of-type(1) > section {
                padding: 0.9rem 0.7rem !important;
            }

            .animate-in.fade-in.pb-28.font-sans.duration-300 h2 {
                margin-bottom: 0.8rem !important;
                font-size: 0.64rem !important;
            }

            .animate-in.fade-in.pb-28.font-sans.duration-300 input,
            .animate-in.fade-in.pb-28.font-sans.duration-300 select,
            .animate-in.fade-in.pb-28.font-sans.duration-300 textarea {
                height: 2.55rem !important;
                font-size: 0.78rem !important;
                padding-top: 0.45rem !important;
                padding-bottom: 0.45rem !important;
            }

            .animate-in.fade-in.pb-28.font-sans.duration-300 label,
            .animate-in.fade-in.pb-28.font-sans.duration-300 .text-\[10px\] {
                font-size: 0.56rem !important;
            }

            .animate-in.fade-in.pb-28.font-sans.duration-300 button.h-11 {
                height: 2.35rem !important;
                font-size: 0.58rem !important;
            }

            .animate-in.fade-in.pb-28.font-sans.duration-300 .space-y-5 > :not([hidden]) ~ :not([hidden]) {
                margin-top: 0.8rem !important;
            }

            .animate-in.fade-in.pb-28.font-sans.duration-300 .py-4 {
                padding-top: 0.65rem !important;
                padding-bottom: 0.65rem !important;
            }

            .animate-in.fade-in.pb-28.font-sans.duration-300 .h-11.w-11 {
                width: 2.15rem !important;
                height: 2.15rem !important;
            }

            .animate-in.fade-in.pb-28.font-sans.duration-300 .h-11.w-11 svg {
                width: 0.95rem !important;
                height: 0.95rem !important;
            }

            .animate-in.fade-in.pb-28.font-sans.duration-300 .text-lg {
                font-size: 0.92rem !important;
            }

            .animate-in.fade-in.pb-28.font-sans.duration-300 .text-3xl {
                font-size: 1.55rem !important;
            }

            .animate-in.fade-in.pb-28.font-sans.duration-300 .mt-6 {
                margin-top: 0.8rem !important;
            }

            .animate-in.fade-in.pb-28.font-sans.duration-300 .px-5.py-5 {
                padding: 0.85rem !important;
            }

            .animate-in.fade-in.pb-28.font-sans.duration-300 > section:last-child {
                position: fixed !important;
                left: 0 !important;
                right: 0 !important;
                bottom: calc(4.65rem + env(safe-area-inset-bottom)) !important;
                z-index: 70 !important;
                border: 0 !important;
                padding: 0.5rem 0.75rem !important;
                background: linear-gradient(180deg, rgba(2, 8, 23, 0), rgba(2, 8, 23, 0.94) 34%, rgba(2, 8, 23, 0.99));
                backdrop-filter: blur(10px);
            }

            .animate-in.fade-in.pb-28.font-sans.duration-300 > section:last-child h2,
            .animate-in.fade-in.pb-28.font-sans.duration-300 > section:last-child p {
                display: none !important;
            }

            .animate-in.fade-in.pb-28.font-sans.duration-300 > section:last-child button {
                height: 2.85rem !important;
                border-radius: 0.75rem !important;
                font-size: 0.7rem !important;
                box-shadow: 0 10px 28px rgba(5, 150, 105, 0.28) !important;
            }

            .animate-in.fade-in.pb-28.font-sans.duration-300 > section:last-child button svg {
                width: 1rem !important;
                height: 1rem !important;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script src="/dev-cache-reset.js"></script>
    <script type="module" src="./main.tsx"></script>
</body>
</html>
